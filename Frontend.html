<!DOCTYPE html>
<html>
<head>
<title>SMART GEO-INTELLIGENT AGRICULTURE DECISION SUPPORT SYSTEM</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.5)),
url("farm_bg.jpeg");
background-size:cover;
color:white;
min-height:100vh;
display:flex;
flex-direction:column;
}

/* NAVBAR */
nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 50px;
background:rgba(0,0,0,0.9);
}

.logo{
display:flex;
align-items:center;
gap:10px;
font-size:22px;
font-weight:bold;
}

.logo img{
height:85px;
}

.nav-links{
display:flex;
gap:30px;
}

/* ✅ INCREASED NAV TEXT */
.nav-links a{
font-size:20px;
color:white;
cursor:pointer;
}

/* MAIN */
.main{flex:1;}

.hero{
text-align:center;
margin-top:40px;
}

.title{
font-size:42px;
font-weight:bold;
background:linear-gradient(90deg,#ff9800,#ffd54f);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
margin-bottom:25px;
}

.title span{display:block;}

button{
padding:14px 35px;
background:#ff9800;
border:none;
border-radius:10px;
color:white;
font-size:18px;
cursor:pointer;
}

/* MAP */
.map{
margin-top:20px;
display:flex;
justify-content:center;
}

iframe{
width:320px;
height:200px;
border-radius:12px;
border:none;
}

/* ✅ SPACE + HIGHLIGHT */
#bestCrop{
margin-top:25px; /* space added */
display:inline-block;
padding:10px 25px;
background:linear-gradient(90deg,#ffd54f,#ff9800);
color:black;
font-weight:bold;
font-size:20px;
border-radius:25px;
box-shadow:0 0 15px rgba(255,200,0,0.6);
}

/* CARDS */
.cards{
display:flex;
justify-content:center;
gap:25px;
margin-top:35px;
flex-wrap:wrap;
}

.card{
background:white;
color:black;
padding:20px;
width:200px;
border-radius:15px;
text-align:center;
opacity:0;
transform:translateY(20px);
transition:all 0.5s ease;
}

.card.show{
opacity:1;
transform:translateY(0);
}

/* CHARTS */
.charts{
display:flex;
justify-content:center;
gap:25px;
margin-top:35px;
flex-wrap:wrap;
}

canvas{
background:white;
padding:15px;
border-radius:12px;
width:380px!important;
height:280px!important;
}

/* INSIGHTS */
.insights{
margin-top:30px;
text-align:center;
font-size:20px;
line-height:1.8;
margin-bottom:50px;
}

/* FOOTER */
footer{
padding:20px;
background:rgba(0,0,0,0.9);
text-align:center;
margin-top:auto;
}
</style>
</head>

<body>

<nav>
<div class="logo">
<img src="logo.png">
SMART FARMING AI
</div>

<div class="nav-links">
<a>Home</a>
<a>Market Trends</a>
<a>Weather Forecast</a>
</div>
</nav>

<div class="main">

<div class="hero">

<div class="title">
<span>SMART GEO-INTELLIGENT AGRICULTURE</span>
<span>DECISION SUPPORT SYSTEM</span>
</div>

<button onclick="getData()">Get Recommendation</button>

<p id="status">📍 Detecting location...</p>

<div class="map">
<iframe id="mapFrame"></iframe>
</div>

<!-- ✅ HIGHLIGHTED -->
<div id="bestCrop"></div>

</div>

<div class="cards" id="cards"></div>

<div class="charts" id="charts"></div>

<div class="insights" id="insights"></div>

</div>

<footer>Help & Support | Privacy Policy</footer>

<script>

async function getData(){

navigator.geolocation.getCurrentPosition(async pos=>{

let lat=pos.coords.latitude;
let lon=pos.coords.longitude;

/* LOCATION */
let geo=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&accept-language=en`);
let g=await geo.json();
let a=g.address;

let area = a.suburb || a.neighbourhood || a.village || a.hamlet || a.locality || "";
let city = a.city || a.town || a.municipality || a.county || "";
let state = a.state || "";

let loc = `${area}, ${city}, ${state}`;
loc = loc.replace(/(^,)|(,,+)|(,$)/g, "").replace(/,\s*,/g, ",");

document.getElementById("status").innerText="📍 "+loc;

/* MAP */
document.getElementById("mapFrame").src =
`https://maps.google.com/maps?q=${lat},${lon}&z=15&output=embed`;

/* BACKEND */
let res=await fetch("http://127.0.0.1:5000/predict",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({lat,lon})
});

let data=await res.json();

let container=document.getElementById("cards");
container.innerHTML="";

let best = data.reduce((a,b)=> a.profit > b.profit ? a : b);

/* ✅ HIGHLIGHT TEXT */
document.getElementById("bestCrop").innerText=
"🌟 Highly Recommended: " + best.crop;

/* CARDS */
data.forEach((d,index)=>{

setTimeout(()=>{
let card=document.createElement("div");
card.className="card";

card.innerHTML=`
<h3>${d.crop}</h3>
<p>🌾 Yield: ${d.yield}</p>
<p>💰 Price: ₹${d.price}</p>
<p>📈 Profit: ₹${d.profit}</p>
`;

container.appendChild(card);

requestAnimationFrame(()=>{
card.classList.add("show");
});

}, index * 120);

});

setTimeout(()=>createCharts(data), data.length * 130);

});

}

function createCharts(data){

let chartsDiv=document.getElementById("charts");
chartsDiv.innerHTML=`
<canvas id="yieldChart"></canvas>
<canvas id="priceChart"></canvas>
<canvas id="profitChart"></canvas>
`;

let labels=data.map(d=>d.crop);

new Chart(yieldChart,{
type:"bar",
data:{labels,datasets:[{label:"Yield",data:data.map(d=>d.yield),backgroundColor:"orange"}]}
});

new Chart(priceChart,{
type:"bar",
data:{labels,datasets:[{label:"Price",data:data.map(d=>d.price),backgroundColor:"blue"}]}
});

new Chart(profitChart,{
type:"bar",
data:{labels,datasets:[{label:"Profit",data:data.map(d=>d.profit),backgroundColor:"green"}]}
});

let best = data.reduce((a,b)=> a.profit > b.profit ? a : b);

document.getElementById("insights").innerHTML=`
🌦 <b>Weather Impact:</b> Moderate climate improves crop growth.<br>
👉 Stable temperature ensures consistent yield.<br><br>

💡 <b>Recommendation:</b> Choose <b>${best.crop}</b> for maximum profit.<br>
👉 High market demand increases returns.<br><br>

⚠ <b>Risk:</b> Sudden rainfall fluctuations may reduce yield.<br>
👉 Proper irrigation planning can minimize loss.
`;
}

</script>

</body>
</html>
